server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Docker DNS resolver
    resolver 127.0.0.11 valid=30s;

    # Proxy API requests to the backend
    location /api {
        set $backend_url http://backend:3000$request_uri;
        proxy_pass $backend_url;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Cho phép gửi các mảnh video lớn qua API
        client_max_body_size 2048M;
    }

    # Proxy media uploads to the backend
    location /uploads {
        set $backend_url http://backend:3000$request_uri;
        proxy_pass $backend_url;
        
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 2048M;
    }

    # Proxy legacy player to the backend
    location /player-legacy {
        set $backend_url http://backend:3000;
        rewrite ^/player-legacy/(.*) /player-legacy/$1 break;
        proxy_pass $backend_url;
    }

    # Optional: Cache static assets
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6m;
        access_log off;
        add_header Cache-Control "public";
    }
}
