version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adplay-backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-change-me-please-very-secret}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - MAX_UPLOAD_SIZE_MB=2048
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/db.json:/app/db.json
    networks:
      - adplay-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: adplay-frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - adplay-network

networks:
  adplay-network:
    driver: bridge
