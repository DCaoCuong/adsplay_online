version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: adplay-backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-2048}
    volumes:
      - adplay-uploads:/app/uploads
      - adplay-db:/app/data
    networks:
      - adplay-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: adplay-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - adplay-network

volumes:
  adplay-uploads:
  adplay-db:

networks:
  adplay-network:
    driver: bridge
